<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>verify</title></head>
<body>
<pre id="log"></pre>
<script type="module">
import core from 'https://esm.sh/@theatre/core@0.7.2';
const { getProject } = core;
const log = (...a) => { console.log(...a); document.getElementById('log').textContent += a.join(' ') + '\n'; };

async function main(){
  const state = /* __STATE_INLINE__ */;
  const project = getProject('My Sweetheart', { state });
  const sheet = project.sheet('Lyrics');
  await project.ready;

  const scene0 = sheet.object('scene-0', { opacity:1, y:0 });
  const scene1 = sheet.object('scene-1', { opacity:0, y:0 });
  const anchor1 = sheet.object('anchor-1', { opacity:0, y:90, rot:0 });
  const mood = sheet.object('mood', { hue:6, warmth:0.55 });
  const samples = [];
  for (const t of [0, 5, 13.0, 13.9, 14.7, 16, 22, 34.5, 36]){
    sheet.sequence.position = t;
    samples.push({
      t,
      s0: +scene0.value.opacity.toFixed(2),
      s1: +scene1.value.opacity.toFixed(2),
      anchor1Y: +anchor1.value.y.toFixed(1),
      anchor1Op: +anchor1.value.opacity.toFixed(2),
      moodHue: +mood.value.hue.toFixed(1),
    });
  }
  window.__RESULT__ = samples;
  window.__DONE__ = true;
  log(JSON.stringify(samples, null, 2));
}
main().catch(e => { log('ERROR', e.message, e.stack); window.__ERROR__ = String(e.stack || e); });
</script>
</body>
</html>
