<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Sweetheart</title>
<meta name="description" content="A Theatre.js-choreographed lyric poster for a 1910 love song. One button. Press play.">
<meta name="theme-color" content="#a92c17">
<link rel="preload" href="/fonts/titan-one-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/cookie-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/oswald-500.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>

<div id="bg"></div>
<div id="grain"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="progress"><div id="progress-fill"></div></div>

<audio id="track" src="audio/let-me-call-you-sweetheart.mp3" preload="metadata"></audio>

<main id="stage">
  <div class="poster-col">
    <div id="caption"></div>
    <div id="poster"></div>
  </div>
</main>

<div id="finale">
  <img class="finale-photo fp-1" src="assets/photo/rose.png" alt="">
  <img class="finale-photo fp-2" src="assets/photo/ring.png" alt="">
  <img class="finale-photo fp-3" src="assets/photo/pearl-necklace.png" alt="">
  <img class="finale-heart" src="assets/photo/rose.png" alt="">
  <div class="finale-text">
    <span class="line1">FROM NAVEEN,</span>
    <span class="line2">with love</span>
  </div>
</div>

<button id="play-btn" aria-label="Play">
  <span class="icon-wrap">
    <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </span>
</button>

<script type="module" src="/src/main.js"></script>
</body>
</html>
