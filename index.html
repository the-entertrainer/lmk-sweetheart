<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Let Me Call You Sweetheart</title>
<meta name="description" content="An ink-doodle lyric page for a 1910 love song. One button. Press play.">
<meta name="theme-color" content="#fdfbf7">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fdfbf7;
    --ink:#1a1a1a;
    --ink-dim:#8c8a85;
    --ink-faint:#c9c6bf;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Caveat',cursive;
    overflow-x:hidden;
    touch-action:pan-y;
    position:relative;
  }
  ::selection{background:var(--ink);color:var(--paper);}

  /* ---------- PAPER TEXTURE ---------- */
  #paper-grain{
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background-image:url('assets/tex/grain.png');
    background-size:128px 128px;
    opacity:.5;
    mix-blend-mode:multiply;
  }
  #vignette{
    position:fixed; inset:0; z-index:4; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 40%, transparent 55%, rgba(0,0,0,.05) 100%);
  }

  /* ---------- LYRICS STAGE ---------- */
  #lyrics{ position:relative; max-width:760px; margin:0 auto; padding:14vh 1.4rem 40vh; z-index:2; }
  .lyric-block{ position:relative; display:flex; align-items:center; justify-content:center; min-height:110px; text-align:center; }
  .lyric-line{
    font-weight:700; font-size:clamp(2.6rem, 10vw, 6rem); line-height:1.08;
    color:var(--ink); opacity:.16; transform:scale(.94) translateY(6px);
    transition:opacity .6s cubic-bezier(.23,1,.32,1), transform .6s cubic-bezier(.23,1,.32,1), color .6s ease;
    position:relative; z-index:3;
  }
  .lyric-line.spoken{
    font-weight:600; font-size:clamp(1.5rem,4.6vw,2.2rem); color:var(--ink-dim); max-width:600px;
  }
  .lyric-line.active{ opacity:1; transform:scale(1.03) translateY(0); }
  .lyric-line.passed{ opacity:.14; }
  .lyric-line.fx-finale.active{ animation:finale-pulse 1.3s ease-in-out infinite alternate; }
  @keyframes finale-pulse{ 0%{transform:scale(1.03) translateY(0);} 100%{transform:scale(1.07) translateY(0);} }
  @media (prefers-reduced-motion: reduce){
    .lyric-line, .lyric-line.active, .lyric-line.fx-finale.active{ transition:opacity .3s ease !important; animation:none !important; transform:none !important; }
  }

  .gap-block{ min-height:70px; }

  .divider{ display:flex; align-items:center; justify-content:center; margin:.4rem 0 1.6rem; z-index:3; position:relative; }
  .divider svg{ width:110px; height:16px; opacity:.4; }
  .divider path{ fill:none; stroke:var(--ink); stroke-width:2; stroke-linecap:round; }

  /* ---------- INK DOODLES ---------- */
  .doodle-wrap{ position:absolute; top:50%; pointer-events:none; z-index:1; }
  .doodle-wrap svg{ width:100%; height:100%; overflow:visible; }
  .doodle-wrap path, .doodle-wrap circle{ fill:none; stroke:var(--ink); vector-effect:non-scaling-stroke; }
  .doodle-wrap.side-left{ left:clamp(-40px, -6vw, -6px); }
  .doodle-wrap.side-right{ right:clamp(-40px, -6vw, -6px); }
  .doodle-wrap.accent{ width:clamp(150px, 30vw, 300px); opacity:.62; }
  .doodle-wrap.ambient{ width:clamp(90px, 18vw, 170px); opacity:.24; }

  /* ---------- PLAY BUTTON — the only control ---------- */
  #play-btn{
    position:fixed; left:50%; bottom:6vh; z-index:50;
    width:84px; height:84px; margin-left:-42px;
    border:none; background:none; cursor:pointer; padding:0;
    -webkit-tap-highlight-color:transparent;
    animation:blob-breathe 4.5s ease-in-out infinite;
  }
  #play-btn:active .blob-shape{ transform:scale(.88) rotate(-6deg); }
  @keyframes blob-breathe{
    0%,100%{ transform:scale(1) rotate(0deg); } 50%{ transform:scale(1.045) rotate(2deg); }
  }
  .blob-shape{
    position:absolute; inset:0; transition:transform .45s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 10px 20px rgba(0,0,0,.22));
  }
  .blob-shape svg{ width:100%; height:100%; }
  .blob-shape path{ fill:var(--ink); }
  .icon-wrap{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--paper); pointer-events:none;
  }
  .icon-wrap svg{ width:30px; height:30px; transition:opacity .3s ease, transform .4s cubic-bezier(.34,1.56,.64,1); }
  #icon-play{ transform:translateX(2px); }
  #icon-pause{ opacity:0; transform:scale(.6) rotate(-90deg); position:absolute; }
  #play-btn.is-playing #icon-play{ opacity:0; transform:scale(.6) rotate(90deg); }
  #play-btn.is-playing #icon-pause{ opacity:1; transform:scale(1) rotate(0deg); position:absolute; }
  .ink-ripple{
    position:absolute; inset:0; border-radius:50%; background:var(--ink);
    opacity:0; pointer-events:none;
  }
  .ink-ripple.firing{ animation:ripple .55s ease-out; }
  @keyframes ripple{ 0%{ opacity:.28; transform:scale(.7);} 100%{ opacity:0; transform:scale(1.7);} }
  @media (prefers-reduced-motion: reduce){
    #play-btn{ animation:none; }
  }
</style>
</head>

<script>
(function(){
  "use strict";

  /* ---------------------------------------------------------------------
   * REAL TIMING DATA — every start/end came from running faster-whisper
   * (word-level timestamps) directly on audio/let-me-call-you-sweetheart.mp3,
   * a 1924 Jubileers vocal-quartet recording of this public-domain 1910
   * song, then checked against the printed lyric. Nothing here is guessed.
   * ------------------------------------------------------------------- */
  const TOTAL_DURATION = 179.4; // ffprobe-measured file duration
  const PX_PER_SEC = 80;

  const LYRICS = [
    { start: 3.10,  end: 7.60,   type:'spoken', text: "How about some close harmony on that old love song, Let Me Call You Sweetheart?" },
    { start: 7.80,  end: 9.00,   type:'spoken', text: "Where's our pitch on that, Russ?" },
    { start: 14.70, end: 22.90,  section:1, text: "Oh, let me call you sweetheart,", doodle:'doodle-rose', side:'left', tier:'accent' },
    { start: 22.90, end: 31.16,  text: "I'm in love with you", doodle:'doodle-wildflower', side:'right', tier:'ambient' },
    { start: 35.52, end: 43.72,  text: "Keep the love light glowing", doodle:'doodle-fern', side:'left', tier:'ambient' },
    { start: 43.72, end: 58.42,  text: "in your eyes so true", doodle:'doodle-tulip', side:'right', tier:'accent' },
    { start: 61.36, end: 70.60,  section:2, text: "I am dreaming, dear, of you,", doodle:'doodle-daisy', side:'left', tier:'accent' },
    { start: 70.60, end: 80.34,  text: "day by day", doodle:'doodle-branch', side:'right', tier:'ambient' },
    { start: 80.34, end: 93.38,  text: "When the silvery moonlight gleams", doodle:'doodle-star', side:'left', tier:'ambient' },
    { start: 95.70, end: 101.72, text: "still I wander on in dreams", doodle:'doodle-tendril', side:'right', tier:'ambient' },
    { start: 101.72,end: 110.88, text: "Just with you, just with you", doodle:'doodle-wildflower-2', side:'left', tier:'accent' },
    { start: 113.32,end: 121.24, section:3, text: "Let me call you sweetheart,", doodle:'doodle-rose-2', side:'right', tier:'accent' },
    { start: 121.24,end: 130.34, text: "I'm in love with you", doodle:'doodle-dotbranch', side:'left', tier:'ambient' },
    { start: 134.42,end: 142.44, text: "Keep the love light glowing", doodle:'doodle-berry', side:'right', tier:'ambient' },
    { start: 144.62,end: 163.08, text: "in your eyes so true", fx:'fx-finale', doodle:'doodle-daisy-2', side:'left', tier:'accent' },
    { start: 177.98,end: 179.40, section:4, text: "Let me hear you whisper that you love me too…", fx:'fx-finale', doodle:'doodle-branch-2', side:'right', tier:'accent' },
  ];

  const GAP_DOODLES = {
    "9.00":   { doodle:'doodle-bud', side:'right' },
    "31.16":  { doodle:'doodle-star-2', side:'left' },
    "58.42":  { doodle:'doodle-fern-2', side:'right' },
    "93.38":  { doodle:'doodle-bud-2', side:'left' },
    "110.88": { doodle:'doodle-tulip', side:'right' },
    "130.34": { doodle:'doodle-dotbranch', side:'left' },
    "163.08": { doodle:'doodle-rose', side:'left', extra:{doodle:'doodle-branch', side:'right'} },
  };

  /* ---------------------------------------------------------------------
   * TIMELINE — auto-fills instrumental gaps so scroll height always maps
   * exactly to elapsed seconds, with zero unaccounted time.
   * ------------------------------------------------------------------- */
  function buildTimeline(lines, totalDuration){
    const sorted = [...lines].sort((a,b) => a.start - b.start);
    const timeline = [];
    let cursor = 0;
    for (const line of sorted){
      if (line.start - cursor > 0.6){
        timeline.push({ type:'gap', start: cursor, end: line.start });
      }
      timeline.push(Object.assign({}, line, { type: line.type || 'line', start: Math.max(line.start, cursor) }));
      cursor = Math.max(cursor, line.end);
    }
    if (totalDuration - cursor > 0.6){
      timeline.push({ type:'gap', start: cursor, end: totalDuration });
    } else if (totalDuration > cursor){
      timeline[timeline.length - 1].end = totalDuration;
    }
    return timeline;
  }

  /* ---------------------------------------------------------------------
   * STATE
   * ------------------------------------------------------------------- */
  const audio = document.getElementById('track');
  const lyricsEl = document.getElementById('lyrics');
  const playBtn = document.getElementById('play-btn');
  const ripple = playBtn.querySelector('.ink-ripple');

  let started = false;
  let lyricEls = [];       // { el, start, end }
  let activeIndex = -1;
  let bounds = { start: 0, end: 0 };
  let rafId = null;
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const devTagMode = new URLSearchParams(location.search).get('tag') === '1';

  const TIMELINE = buildTimeline(LYRICS, TOTAL_DURATION);

  /* ---------------------------------------------------------------------
   * DRAW-IN DOODLES — clone each symbol's real paths (not <use>, so each
   * path/circle can get its own getTotalLength()-based stroke-dasharray),
   * and reveal them stroke-by-stroke via IntersectionObserver, like they're
   * being drawn in ink as the page reaches them.
   * ------------------------------------------------------------------- */
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const shapes = entry.target.__shapes || [];
      if (entry.isIntersecting){
        shapes.forEach((el, i) => {
          el.style.transitionDelay = (i * 90) + 'ms';
          el.style.strokeDashoffset = '0';
        });
        entry.target.style.opacity = entry.target.__targetOpacity;
      } else {
        entry.target.style.opacity = '0';
        shapes.forEach(el => { el.style.transitionDelay = '0ms'; el.style.strokeDashoffset = el.__len; });
      }
    });
  }, { threshold: 0.2 });

  function placeDoodle(block, symbolId, side, tier){
    const symbol = document.getElementById(symbolId);
    if (!symbol) return;
    const wrap = document.createElement('div');
    wrap.className = 'doodle-wrap side-' + side + ' ' + tier;
    wrap.style.top = (30 + Math.random()*20) + '%';
    wrap.style.opacity = '0';
    wrap.__targetOpacity = tier === 'accent' ? '.62' : '.24';

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.innerHTML = symbol.innerHTML;
    const tilt = (Math.random() * 20 - 10) + (side === 'left' ? -4 : 4);
    svg.style.transform = 'rotate(' + tilt + 'deg)';
    wrap.appendChild(svg);
    block.appendChild(wrap);

    const shapes = Array.from(svg.querySelectorAll('path, circle'));
    shapes.forEach(el => {
      let len = 60;
      try { len = el.getTotalLength ? el.getTotalLength() : 60; } catch(e){}
      el.__len = len;
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = reducedMotion ? '0' : len;
      el.style.transition = reducedMotion ? 'none' : 'stroke-dashoffset 1s ease-out';
    });
    wrap.__shapes = shapes;
    wrap.style.transition = 'opacity .5s ease';
    io.observe(wrap);
  }

  /* ---------------------------------------------------------------------
   * BUILD DOM — block height proportional to duration (the "soul")
   * ------------------------------------------------------------------- */
  let lastSection = null;
  function buildLyrics(){
    TIMELINE.forEach((entry) => {
      const dur = Math.max(0.4, entry.end - entry.start);
      const block = document.createElement('div');
      block.style.minHeight = Math.max(60, dur * PX_PER_SEC) + 'px';
      block.style.position = 'relative';

      if (entry.type === 'gap'){
        block.className = 'lyric-block gap-block';
        const gapCue = GAP_DOODLES[entry.start.toFixed(2)];
        if (gapCue){
          placeDoodle(block, gapCue.doodle, gapCue.side, 'accent');
          if (gapCue.extra) placeDoodle(block, gapCue.extra.doodle, gapCue.extra.side, 'ambient');
        }
        lyricsEl.appendChild(block);
        return;
      }

      if (entry.section && entry.section !== lastSection){
        lastSection = entry.section;
        const div = document.createElement('div');
        div.className = 'divider';
        div.innerHTML = '<svg viewBox="0 0 110 16"><path d="M2,8 Q20,2 38,9 T72,7 T108,8"/></svg>';
        lyricsEl.appendChild(div);
      }

      block.className = 'lyric-block';
      const line = document.createElement('div');
      line.className = 'lyric-line' + (entry.type === 'spoken' ? ' spoken' : '') + (entry.fx === 'fx-finale' ? ' fx-finale' : '');
      line.textContent = entry.text;
      block.appendChild(line);

      if (entry.doodle) placeDoodle(block, entry.doodle, entry.side || 'left', entry.tier || 'ambient');

      lyricsEl.appendChild(block);
      lyricEls.push({ el: line, start: entry.start, end: entry.end });
    });
  }

  function computeBounds(){
    const top = lyricsEl.offsetTop;
    const height = lyricsEl.offsetHeight - window.innerHeight;
    bounds = { start: Math.max(0, top), end: Math.max(0, top) + Math.max(1, height) };
  }

  /* ---------------------------------------------------------------------
   * ACTIVE LINE
   * ------------------------------------------------------------------- */
  function findIndexForTime(t){
    for (let i = lyricEls.length - 1; i >= 0; i--){
      if (t >= lyricEls[i].start) return i;
    }
    return -1;
  }

  function setActive(t){
    const idx = findIndexForTime(t);
    if (idx === activeIndex) return;
    if (activeIndex >= 0 && lyricEls[activeIndex]){
      lyricEls[activeIndex].el.classList.remove('active');
      lyricEls[activeIndex].el.classList.add('passed');
    }
    activeIndex = idx;
    const cur = lyricEls[activeIndex];
    if (cur){
      cur.el.classList.remove('passed');
      cur.el.classList.remove('active');
      void cur.el.offsetWidth;
      cur.el.classList.add('active');
    }
  }

  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  /* ---------------------------------------------------------------------
   * THE ONLY ENGINE — audio.currentTime drives scroll position. There is
   * no manual scroll-to-sync mode anymore: press play, the page scrolls
   * itself, in time, the whole way through.
   * ------------------------------------------------------------------- */
  function autoTick(){
    if (audio.paused){ rafId = null; return; }
    const t = audio.currentTime;
    const progress = clamp(t / TOTAL_DURATION, 0, 1);
    const targetY = bounds.start + progress * (bounds.end - bounds.start);
    const current = window.scrollY;
    const next = reducedMotion ? targetY : current + (targetY - current) * 0.1;
    window.scrollTo(0, next);

    setActive(t);

    if (t >= TOTAL_DURATION - 0.15){
      cancelAnimationFrame(rafId); rafId = null;
      finishSong();
      return;
    }
    rafId = requestAnimationFrame(autoTick);
  }

  function finishSong(){
    playBtn.classList.remove('is-playing');
    audio.pause();
    audio.currentTime = 0;
    activeIndex = -1;
    lyricEls.forEach(l => l.el.classList.remove('active','passed'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
    started = false;
  }

  /* ---------------------------------------------------------------------
   * PLAY BUTTON — the only control on the page
   * ------------------------------------------------------------------- */
  function fireRipple(){
    ripple.classList.remove('firing');
    void ripple.offsetWidth;
    ripple.classList.add('firing');
  }

  function togglePlay(){
    fireRipple();
    if (!started){
      started = true;
      computeBounds();
    }
    if (audio.paused){
      audio.play().catch(()=>{});
      playBtn.classList.add('is-playing');
      if (!rafId) rafId = requestAnimationFrame(autoTick);
    } else {
      audio.pause();
      playBtn.classList.remove('is-playing');
      if (rafId){ cancelAnimationFrame(rafId); rafId = null; }
    }
  }

  /* ---------------------------------------------------------------------
   * DEV TAG HELPER — ?tag=1 for re-timing a different recording quickly
   * ------------------------------------------------------------------- */
  function setupTagMode(){
    const panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;left:1rem;bottom:8rem;z-index:70;background:#000;color:#0f0;font:12px monospace;padding:.6rem .8rem;border-radius:4px;max-width:70vw;max-height:40vh;overflow:auto;';
    panel.innerHTML = '<div>TAG MODE — press T or tap to log time</div><div id="tag-log"></div>';
    document.body.appendChild(panel);
    const log = panel.querySelector('#tag-log');
    const tag = () => { const t = audio.currentTime.toFixed(2); const row = document.createElement('div'); row.textContent = t; log.appendChild(row); console.log('tag:', t); };
    panel.addEventListener('click', tag);
    window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 't') tag(); });
  }

  /* ---------------------------------------------------------------------
   * BOOT
   * ------------------------------------------------------------------- */
  window.togglePlay = togglePlay;

  buildLyrics();
  window.addEventListener('load', computeBounds);
  window.addEventListener('resize', computeBounds);
  audio.addEventListener('loadedmetadata', computeBounds);
  if (devTagMode) setupTagMode();
})();
</script>
</body>
</html>
