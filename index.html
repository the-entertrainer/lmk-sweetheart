<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Sweetheart</title>
<meta name="description" content="A Theatre.js + Three.js choreographed lyric page for a 1910 love song. One button. Press play.">
<meta name="theme-color" content="#1c0e1e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500..800&family=Caveat:wght@500..700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div id="bg"></div>
<canvas id="scene-canvas"></canvas>
<div id="grain"></div>
<div id="vignette"></div>
<div id="progress"><div id="progress-fill"></div></div>

<audio id="track" src="/audio/let-me-call-you-sweetheart.mp3" preload="metadata"></audio>

<div id="intro-vinyl"></div>

<main id="stage"><div id="stack"></div></main>

<div id="finale">
  <div class="finale-flourish" id="finale-flourish"></div>
  <img class="finale-heart" src="/assets/photo/rose.png" alt="">
  <div class="finale-text">
    <span class="line1">From Naveen,</span>
    <span class="line2">with love</span>
  </div>
</div>

<button id="play-btn" aria-label="Play">
  <span class="icon-wrap">
    <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </span>
</button>

<script type="module" src="/src/main.js"></script>
</body>
</html>
